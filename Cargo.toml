[workspace]
members = [
  "crates/ruvyxa_cli",
  "crates/ruvyxa_dev_server",
  "crates/ruvyxa_graph",
  "crates/ruvyxa_diagnostics",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
repository = "https://github.com/thirawat27/ruvyxa"
rust-version = "1.80"

[workspace.dependencies]
anyhow = "1.0"
axum = { version = "0.8", features = ["ws"] }
blake3 = "1.8"
clap = { version = "4.5", features = ["derive"] }
notify = "8.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tempfile = "3.23"
thiserror = "2.0"
tokio = { version = "1.48", features = ["full"] }
tower-http = { version = "0.6", features = ["fs", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
walkdir = "2.5"
