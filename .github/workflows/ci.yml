name: Ruvyxa Framework CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_HTTP_TIMEOUT: '120'
  CARGO_NET_RETRY: '10'
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest, windows-11-arm]

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: 'ruvyxa-${{ matrix.os }}'
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Prefetch Rust dependencies
        run: |
          for attempt in 1 2 3; do
            if cargo fetch --locked; then
              exit 0
            fi
            delay=$((attempt * 20))
            echo "cargo fetch failed on attempt ${attempt}; retrying in ${delay}s"
            sleep "$delay"
          done
          cargo fetch --locked
      - name: Install JavaScript dependencies
        run: |
          for attempt in 1 2 3; do
            if pnpm install --frozen-lockfile --prefer-offline; then
              exit 0
            fi
            delay=$((attempt * 20))
            echo "pnpm install failed on attempt ${attempt}; retrying in ${delay}s"
            sleep "$delay"
          done
          pnpm install --frozen-lockfile --prefer-offline
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
      - name: Check workspace formatting
        run: pnpm format:check
      - name: Check Cargo lockfile
        run: pnpm check:cargo-lock
      - name: Test Rust workspace
        run: cargo test --workspace --locked
      - name: Lint Rust workspace
        run: cargo clippy --workspace --locked -- -D warnings
      - name: Build packages
        run: pnpm -r build
      - name: Check packages
        run: pnpm -r check
      - name: Test packages
        run: pnpm -r test
      - name: Validate release metadata
        run: pnpm release:validate
      - name: Smoke test package tarballs
        run: pnpm pack:smoke
      - name: Set up Bun runtime parity
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'windows-latest'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Verify Bun JavaScript runtime parity
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'windows-latest'
        shell: bash
        run: cargo run -p ruvyxa_cli -- check --root examples/demo --runtime bun
