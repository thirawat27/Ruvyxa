name: Ruvyxa Framework Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_HTTP_TIMEOUT: '120'
  CARGO_NET_RETRY: '10'
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

defaults:
  run:
    shell: bash

jobs:
  resolve-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"
      - name: Validate tag matches package.json
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
  verify-release:
    name: Verify Ruvyxa release candidate
    needs: resolve-version
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ruvyxa-release-verify
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Check formatting and dependency locks
        run: |
          pnpm format:check
          pnpm check:cargo-lock
      - name: Lint and test Rust workspace
        run: |
          cargo clippy --workspace --locked -- -D warnings
          cargo test --workspace --locked
      - name: Build, check, and test packages
        run: |
          pnpm -r build
          pnpm -r check
          pnpm -r test
      - name: Validate release metadata and package tarballs
        run: |
          pnpm release:validate
          pnpm pack:smoke

  publish-ruvyxa-cli:
    name: Publish Ruvyxa CLI (${{ matrix.os }})
    needs: [resolve-version, verify-release]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            package: '@ruvyxa/cli-win32-x64'
          - os: windows-11-arm
            package: '@ruvyxa/cli-win32-arm64'
          - os: ubuntu-latest
            package: '@ruvyxa/cli-linux-x64'
          - os: ubuntu-24.04-arm
            package: '@ruvyxa/cli-linux-arm64'
          - os: macos-latest
            package: '@ruvyxa/cli-darwin-arm64'

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: 'ruvyxa-release-${{ matrix.os }}'
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Prefetch Rust dependencies
        run: |
          for attempt in 1 2 3; do
            if cargo fetch --locked; then
              exit 0
            fi
            delay=$((attempt * 20))
            echo "cargo fetch failed on attempt ${attempt}; retrying in ${delay}s"
            sleep "$delay"
          done
          cargo fetch --locked
      - name: Install JavaScript dependencies
        run: |
          for attempt in 1 2 3; do
            if pnpm install --frozen-lockfile --prefer-offline; then
              exit 0
            fi
            delay=$((attempt * 20))
            echo "pnpm install failed on attempt ${attempt}; retrying in ${delay}s"
            sleep "$delay"
          done
          pnpm install --frozen-lockfile --prefer-offline
      - name: Publish ${{ matrix.package }}
        run: node scripts/publish-if-new.mjs ${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-packages:
    name: Publish Ruvyxa packages
    needs: [resolve-version, verify-release, publish-ruvyxa-cli]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install JavaScript dependencies
        run: |
          for attempt in 1 2 3; do
            if pnpm install --frozen-lockfile --prefer-offline; then
              exit 0
            fi
            delay=$((attempt * 20))
            echo "pnpm install failed on attempt ${attempt}; retrying in ${delay}s"
            sleep "$delay"
          done
          pnpm install --frozen-lockfile --prefer-offline
      - name: Build packages
        run: pnpm -r build
        env:
          SKIP_NATIVE_BUILD: '1'
      - name: Validate release metadata
        run: pnpm release:validate
      - name: Publish @ruvyxa/core
        run: node scripts/publish-if-new.mjs @ruvyxa/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @ruvyxa/react
        run: node scripts/publish-if-new.mjs @ruvyxa/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish adapters
        run: |
          node scripts/publish-if-new.mjs \
            @ruvyxa/adapter-bun \
            @ruvyxa/adapter-cloudflare \
            @ruvyxa/adapter-netlify \
            @ruvyxa/adapter-node \
            @ruvyxa/adapter-static \
            @ruvyxa/adapter-vercel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish ruvyxa
        run: node scripts/publish-if-new.mjs ruvyxa
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          SKIP_NATIVE_BUILD: '1'
      - name: Publish create-ruvyxa
        run: node scripts/publish-if-new.mjs create-ruvyxa
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Release summary
        run: |
          echo "## Release v${{ needs.resolve-version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "All packages published to npm successfully." >> "$GITHUB_STEP_SUMMARY"
